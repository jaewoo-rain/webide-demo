name: Deploy FastAPI

on:
  push:
    branches: [main]
    paths:
      - 'fastapi/**'
      - '!fastapi/react.yaml'
      - '.github/workflows/deploy-fastapi.yml'

concurrency:
  group: deploy-fastapi
  cancel-in-progress: false

env:
  IMAGE: jaewoo2/ide-demo-fastapi
  NAMESPACE: webide-net
  DEPLOYMENT: ide-fastapi
  CONTAINER: ide-fastapi

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "value=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./fastapi
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.sha.outputs.value }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Rollout on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          TAG: ${{ steps.sha.outputs.value }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          envs: IMAGE,NAMESPACE,DEPLOYMENT,CONTAINER,TAG
          script: |
            kubectl set image deployment/${DEPLOYMENT} \
              ${CONTAINER}=${IMAGE}:${TAG} \
              -n ${NAMESPACE}
            kubectl rollout status deployment/${DEPLOYMENT} \
              -n ${NAMESPACE} --timeout=180s
