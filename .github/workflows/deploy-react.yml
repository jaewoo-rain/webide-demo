name: Deploy React

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - 'postcss.config.js'
      - 'tailwind.config.js'
      - 'eslint.config.js'
      - 'nginx.conf'
      - 'Dockerfile'
      - '.github/workflows/deploy-react.yml'

concurrency:
  group: deploy-react
  cancel-in-progress: false

env:
  IMAGE: jaewoo2/webide-react
  NAMESPACE: webide-net
  DEPLOYMENT: webide-react
  CONTAINER: webide-react

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "value=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.sha.outputs.value }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Rollout on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          TAG: ${{ steps.sha.outputs.value }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          envs: IMAGE,NAMESPACE,DEPLOYMENT,CONTAINER,TAG
          script: |
            kubectl set image deployment/${DEPLOYMENT} \
              ${CONTAINER}=${IMAGE}:${TAG} \
              -n ${NAMESPACE}
            kubectl rollout status deployment/${DEPLOYMENT} \
              -n ${NAMESPACE} --timeout=180s
